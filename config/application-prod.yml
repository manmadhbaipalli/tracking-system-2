# Production Configuration for Insurance Management System
# This file contains production-specific settings that complement environment variables

application:
  name: "Insurance Management System"
  version: "1.0.0"
  description: "Integrated Policy, Claims, and Payments Platform"
  environment: "production"

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  worker_class: "uvicorn.workers.UvicornWorker"
  worker_connections: 1000
  max_requests: 1000
  max_requests_jitter: 100
  timeout: 120
  keepalive: 5
  preload_app: true

cors:
  allow_origins:
    - "https://app.insurance.com"
    - "https://admin.insurance.com"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "OPTIONS"
  allow_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Correlation-ID"
    - "X-Request-ID"

database:
  # Connection pool settings for high-throughput production
  pool_size: 20
  max_overflow: 30
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true
  echo: false
  echo_pool: false

  # Connection parameters for PostgreSQL
  connect_args:
    server_side_cursors: true
    prepared_statement_cache_size: 0
    statement_cache_size: 0
    connect_timeout: 10
    command_timeout: 30

security:
  # JWT token settings
  jwt:
    algorithm: "HS256"
    access_token_expire_minutes: 30
    refresh_token_expire_days: 7

  # Password policy
  password:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special_chars: true

  # Account security
  account:
    max_failed_login_attempts: 5
    lockout_duration_minutes: 30
    session_timeout_minutes: 480
    require_2fa: false

  # File upload restrictions
  uploads:
    allowed_types:
      - "pdf"
      - "doc"
      - "docx"
      - "jpg"
      - "jpeg"
      - "png"
    max_size_mb: 10
    scan_for_malware: true

performance:
  # Search and query timeouts
  search_timeout_seconds: 3
  api_timeout_seconds: 5

  # Caching settings
  cache:
    policy_search_ttl: 300  # 5 minutes
    claim_details_ttl: 60   # 1 minute
    user_session_ttl: 1800  # 30 minutes

  # Rate limiting
  rate_limiting:
    enabled: true
    per_minute: 60
    burst_size: 10

  # Concurrent processing limits
  max_concurrent_requests: 100
  max_search_results: 1000

logging:
  # Production logging configuration
  level: "INFO"
  format: "json"

  # Structured logging fields
  include_fields:
    - "timestamp"
    - "level"
    - "logger"
    - "message"
    - "correlation_id"
    - "user_id"
    - "request_id"
    - "duration"

  # Log retention
  audit_log_retention_days: 2555  # 7 years for compliance

  # Sensitive data handling
  mask_sensitive_data: true
  log_sensitive_data: false

  # Request/response logging
  request_logging:
    enabled: true
    include_headers: false
    include_body: false
    max_body_size: 1024

monitoring:
  # Health checks
  health_checks:
    enabled: true
    endpoint: "/health"
    database_check: true
    redis_check: true
    external_services_check: false  # Disabled to avoid cascading failures

  # Metrics collection
  metrics:
    enabled: true
    endpoint: "/metrics"
    include_default_metrics: true

    # Custom business metrics
    custom_metrics:
      - "policy_searches_total"
      - "claims_processed_total"
      - "payments_processed_total"
      - "api_response_duration"
      - "database_query_duration"

integrations:
  # Circuit breaker configuration for external services
  circuit_breaker:
    failure_threshold: 5
    reset_timeout_seconds: 60
    half_open_max_calls: 3

  # Retry configuration
  retry:
    max_attempts: 3
    backoff_factor: 2.0
    base_delay_seconds: 1.0
    max_delay_seconds: 60

  # Timeout settings for external APIs
  timeouts:
    stripe: 30
    banking_apis: 45
    xactimate: 60
    edi_systems: 120
    document_storage: 30

  # Service-specific configurations
  stripe:
    webhook_tolerance: 300  # 5 minutes
    idempotency_key_ttl: 86400  # 24 hours

  banking:
    daily_transaction_limit: 1000000  # $1M
    batch_size: 100

  xactimate:
    max_estimate_size_mb: 50
    processing_timeout: 300

audit:
  # Comprehensive audit trail configuration
  enabled: true

  # Events to audit
  events:
    - "user_login"
    - "user_logout"
    - "policy_created"
    - "policy_updated"
    - "policy_deleted"
    - "claim_created"
    - "claim_updated"
    - "claim_status_changed"
    - "payment_created"
    - "payment_processed"
    - "payment_voided"
    - "payment_reversed"
    - "file_uploaded"
    - "sensitive_data_accessed"

  # Data retention
  retention:
    standard_events: 2555  # 7 years
    sensitive_events: 2555  # 7 years
    performance_events: 90  # 3 months

  # Audit log format
  format:
    include_ip_address: true
    include_user_agent: false
    include_request_headers: false
    mask_sensitive_fields: true

compliance:
  # PCI-DSS compliance settings
  pci_dss:
    enabled: true
    encrypt_card_data: true
    mask_pan_in_logs: true
    secure_key_storage: true

  # Data privacy settings
  data_privacy:
    mask_ssn: true
    mask_tax_id: true
    encrypt_pii: true

  # Regulatory compliance
  regulations:
    sox_compliance: true
    hipaa_compliance: false
    gdpr_compliance: true