services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-app}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-appdb}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-production}
      SERVER_PORT: "8000"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      CB_FAILURE_THRESHOLD: ${CB_FAILURE_THRESHOLD:-5}
      CB_OPEN_DURATION_SECONDS: ${CB_OPEN_DURATION_SECONDS:-30}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
