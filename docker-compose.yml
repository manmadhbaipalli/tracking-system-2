version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VERSION: ${APP_VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
    ports:
      - "8000:8000"
    environment:
      # Application settings
      - ENVIRONMENT=production
      - APP_NAME=Insurance Management System
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=false
      - API_PREFIX=/api/v1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,https://app.insurance.com

      # Database settings
      - DATABASE__POSTGRESQL_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-insurance_secure_2024}@postgres:5432/${POSTGRES_DB:-insurance}
      - DATABASE__ECHO=false
      - DATABASE__POOL_SIZE=10
      - DATABASE__MAX_OVERFLOW=20

      # JWT settings
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production-must-be-32-chars-minimum!}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7

      # Redis for caching
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_2024}

      # External integrations
      - INTEGRATIONS__STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - INTEGRATIONS__STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - INTEGRATIONS__STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - INTEGRATIONS__STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID}

      # Banking integrations
      - INTEGRATIONS__ACH_API_KEY=${ACH_API_KEY}
      - INTEGRATIONS__ACH_API_URL=${ACH_API_URL}
      - INTEGRATIONS__WIRE_TRANSFER_API_KEY=${WIRE_TRANSFER_API_KEY}
      - INTEGRATIONS__WIRE_TRANSFER_API_URL=${WIRE_TRANSFER_API_URL}

      # Xactimate/XactAnalysis
      - INTEGRATIONS__XACTIMATE_API_KEY=${XACTIMATE_API_KEY}
      - INTEGRATIONS__XACTIMATE_API_URL=${XACTIMATE_API_URL}
      - INTEGRATIONS__XACTANALYSIS_API_KEY=${XACTANALYSIS_API_KEY}
      - INTEGRATIONS__XACTANALYSIS_API_URL=${XACTANALYSIS_API_URL}

      # EDI systems
      - INTEGRATIONS__EDI_835_ENDPOINT=${EDI_835_ENDPOINT}
      - INTEGRATIONS__EDI_837_ENDPOINT=${EDI_837_ENDPOINT}
      - INTEGRATIONS__EDI_API_KEY=${EDI_API_KEY}

      # Document storage
      - INTEGRATIONS__DOCUMENT_STORAGE_BUCKET=${DOCUMENT_STORAGE_BUCKET}
      - INTEGRATIONS__DOCUMENT_STORAGE_KEY=${DOCUMENT_STORAGE_KEY}
      - INTEGRATIONS__DOCUMENT_STORAGE_SECRET=${DOCUMENT_STORAGE_SECRET}

      # Security settings
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PASSWORD_MIN_LENGTH=8
      - MAX_FAILED_LOGIN_ATTEMPTS=5
      - ACCOUNT_LOCKOUT_DURATION_MINUTES=30
      - SESSION_TIMEOUT_MINUTES=480
      - REQUIRE_2FA=false

      # Performance settings
      - MAX_SEARCH_RESULTS=1000
      - SEARCH_TIMEOUT_SECONDS=3
      - API_TIMEOUT_SECONDS=5
      - POLICY_SEARCH_CACHE_TTL=300
      - CLAIM_DETAILS_CACHE_TTL=60
      - MAX_CONCURRENT_REQUESTS=100
      - RATE_LIMIT_PER_MINUTE=60

      # Logging settings
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - AUDIT_LOG_RETENTION_DAYS=2555
      - ENABLE_REQUEST_LOGGING=true
      - LOG_SENSITIVE_DATA=false

      # Email settings
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=true
      - FROM_EMAIL=${FROM_EMAIL:-noreply@insurance.com}

      # Monitoring
      - ENABLE_METRICS=true
      - METRICS_ENDPOINT=/metrics
      - HEALTH_CHECK_ENDPOINT=/health
      - ENABLE_DATABASE_HEALTH_CHECK=true

    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - app_data:/app/data

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - app_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-insurance}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-insurance_secure_2024}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - app_network
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-insurance}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    command: >
      --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1 --save 300 10 --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_network
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Nginx reverse proxy (for production)
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - app_network
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Named volumes for persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  app_data:
    driver: local
  nginx_logs:
    driver: local

# Network for service communication
networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16